<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#8B9556" />
    <meta
      name="description"
      content="Aplikasi web klasifikasi citra makanan menggunakan EfficientNetV2B0 dengan dataset Food-101. Dapatkan informasi gizi dari 101 jenis makanan."
    />
    <meta name="keywords" content="klasifikasi makanan, EfficientNetV2B0, CNN, Food-101, TensorFlow.js, informasi gizi, nutrisi" />
    <meta name="author" content="Satria Tarigan" />
    <meta property="og:title" content="Klasifikasi Makanan CNN - EfficientNetV2B0" />
    <meta property="og:description" content="Implementasi EfficientNetV2B0 untuk Klasifikasi Citra Makanan dan Informasi Gizi Berbasis Web" />
    <meta property="og:type" content="website" />
    <title>Klasifikasi Makanan CNN - EfficientNetV2B0 | Informasi Gizi</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', 'Georgia', serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #FAF7F2;
        color: #2c2c2c;
      }

      code {
        font-family: 'Segoe UI', 'Georgia', serif;
      }

      /* Farm-to-Table Preloader */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #FAF7F2;
        background-image:
          radial-gradient(ellipse at 30% 40%, rgba(139, 149, 86, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 70% 60%, rgba(166, 123, 91, 0.1) 0%, transparent 50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .preloader-spinner {
        width: 80px;
        height: 80px;
        border: 5px solid transparent;
        border-top-color: #8B9556;
        border-right-color: #A67B5B;
        border-radius: 50%;
        animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        box-shadow: 0 4px 20px rgba(139, 149, 86, 0.2);
        position: relative;
      }

      .preloader-spinner::before {
        content: '';
        position: absolute;
        top: 8px;
        left: 8px;
        right: 8px;
        bottom: 8px;
        border: 4px solid transparent;
        border-top-color: #9CAF88;
        border-left-color: #A67B5B;
        border-radius: 50%;
        animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
      }

      .preloader-core {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #8B9556 0%, #A67B5B 50%, #8B9556 100%);
        border-radius: 50%;
        margin-top: -50px;
        margin-bottom: 1.5rem;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 4px 15px rgba(139, 149, 86, 0.3);
      }

      .preloader-text {
        color: #2c2c2c;
        margin-top: 1rem;
        font-size: 1.2rem;
        font-weight: 500;
        letter-spacing: 2px;
        font-family: 'Segoe UI', 'Georgia', serif;
      }

      .preloader-dots {
        display: flex;
        gap: 8px;
        margin-top: 1rem;
      }

      .preloader-dots span {
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #8B9556 0%, #A67B5B 100%);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
        box-shadow: 0 2px 8px rgba(139, 149, 86, 0.3);
      }

      .preloader-dots span:nth-child(1) {
        animation-delay: 0s;
      }

      .preloader-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .preloader-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.9;
        }
      }

      @keyframes bounce {
        0%, 80%, 100% {
          transform: scale(0.7);
          opacity: 0.6;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="preloader-spinner"></div>
      <div class="preloader-core"></div>
      <div class="preloader-text">Memuat EfficientNetV2B0...</div>
      <div class="preloader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <noscript>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>

    <script>
      // Hide preloader when page is loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(function() {
              preloader.remove();
            }, 500);
          }
        }, 500);
      });
    </script>
  </body>
</html>
