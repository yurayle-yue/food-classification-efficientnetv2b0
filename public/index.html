<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="Aplikasi web klasifikasi citra makanan menggunakan EfficientNetV2B0 dengan dataset Food-101. Dapatkan informasi gizi dari 101 jenis makanan."
    />
    <meta name="keywords" content="klasifikasi makanan, EfficientNetV2B0, CNN, Food-101, TensorFlow.js, informasi gizi, nutrisi" />
    <meta name="author" content="Thesis Project" />
    <meta property="og:title" content="Klasifikasi Makanan CNN - EfficientNetV2B0" />
    <meta property="og:description" content="Implementasi EfficientNetV2B0 untuk Klasifikasi Citra Makanan dan Informasi Gizi Berbasis Web" />
    <meta property="og:type" content="website" />
    <title>Klasifikasi Makanan CNN - EfficientNetV2B0 | Informasi Gizi</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }

      /* Preloader styles */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .preloader-spinner {
        width: 60px;
        height: 60px;
        border: 5px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .preloader-text {
        color: white;
        margin-top: 1.5rem;
        font-size: 1.1rem;
        font-weight: 500;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="preloader-spinner"></div>
      <div class="preloader-text">Memuat EfficientNetV2B0...</div>
    </div>

    <noscript>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>

    <script>
      // Hide preloader when page is loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(function() {
              preloader.remove();
            }, 500);
          }
        }, 500);
      });
    </script>
  </body>
</html>
